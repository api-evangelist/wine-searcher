naftiko: "1.0.0-alpha1"

info:
  label: "Wine-Searcher API"
  description: >-
    Shared consumer definition for the Wine-Searcher API. Provides wine pricing
    data, critic scores, merchant listings, grape variety, region, and vintage
    availability for wines in the Wine-Searcher database.
  tags:
    - Wine Searcher
    - Wine
    - Prices
    - Data
    - Marketplace
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WINE_SEARCHER_API_KEY: WINE_SEARCHER_API_KEY

capability:
  consumes:
    - type: http
      namespace: wine-searcher
      baseUri: https://www.wine-searcher.com/ws_api.php
      description: "Wine-Searcher API for wine pricing and data"
      authentication:
        type: apikey
        key: api_key
        value: "{{WINE_SEARCHER_API_KEY}}"
        placement: query
      resources:
        - name: wine-check
          path: /wine-check
          description: "Wine price check and aggregated data"
          operations:
            - name: get-wine-check
              method: GET
              description: "Get Wine Check Data"
              inputParameters:
                - name: api_key
                  in: query
                  type: string
                  required: true
                  description: "API key for authentication"
                - name: winename
                  in: query
                  type: string
                  required: true
                  description: "Wine name to look up"
                - name: vintage
                  in: query
                  type: string
                  required: false
                  description: "Vintage year"
                - name: currencycode
                  in: query
                  type: string
                  required: false
                  description: "Currency code"
                - name: location
                  in: query
                  type: string
                  required: false
                  description: "Country filter"
                - name: offer_type
                  in: query
                  type: string
                  required: false
                  description: "Offer type filter (R/A/B)"
                - name: format
                  in: query
                  type: string
                  required: false
                  description: "Response format (json/xml)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: market-price
          path: /market-price
          description: "Merchant price listings"
          operations:
            - name: get-market-price
              method: GET
              description: "Get Market Price Listings"
              inputParameters:
                - name: api_key
                  in: query
                  type: string
                  required: true
                  description: "API key for authentication"
                - name: winename
                  in: query
                  type: string
                  required: true
                  description: "Wine name to look up"
                - name: vintage
                  in: query
                  type: string
                  required: false
                  description: "Vintage year"
                - name: currencycode
                  in: query
                  type: string
                  required: false
                  description: "Currency code"
                - name: location
                  in: query
                  type: string
                  required: false
                  description: "Country filter"
                - name: offer_type
                  in: query
                  type: string
                  required: false
                  description: "Offer type filter (R/A/B)"
                - name: format
                  in: query
                  type: string
                  required: false
                  description: "Response format (json/xml)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: wine-searcher-shared-api
      resources:
        - path: /v1/wines
          name: wines
          operations:
            - method: GET
              name: get-wine
              description: "Get wine data"
              call: "wine-searcher.get-wine-check"
              with:
                winename: "rest.winename"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: wine-searcher-shared-mcp
      transport: http
      tools:
        - name: get-wine-data
          description: "Get wine pricing and data from Wine-Searcher"
          hints:
            readOnly: true
            openWorld: true
          call: "wine-searcher.get-wine-check"
          with:
            winename: "tools.winename"
          outputParameters:
            - type: object
              mapping: "$."
