naftiko: 1.0.0-alpha2
info:
  label: Wine-Searcher API — market-price
  description: 'Wine-Searcher API — market-price. 1 operations. Lead operation: Get Market Price Listings. Self-contained
    Naftiko capability covering one Wine Searcher business surface.'
  tags:
  - Wine Searcher
  - market-price
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WINE_SEARCHER_API_KEY: WINE_SEARCHER_API_KEY
capability:
  consumes:
  - type: http
    namespace: wine-searcher-market-price
    baseUri: https://www.wine-searcher.com/ws_api.php
    description: Wine-Searcher API — market-price business capability. Self-contained, no shared references.
    resources:
    - name: market-price
      path: /market-price
      operations:
      - name: getmarketprice
        method: GET
        description: Get Market Price Listings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_key
          in: query
          type: string
          description: Your Wine-Searcher API key
          required: true
        - name: winename
          in: query
          type: string
          description: Name of the wine to look up (URL-encoded)
          required: true
        - name: vintage
          in: query
          type: string
          description: Wine vintage year or NV
        - name: currencycode
          in: query
          type: string
          description: ISO 4217 currency code for price results
        - name: location
          in: query
          type: string
          description: Filter results by country code
        - name: state
          in: query
          type: string
          description: Filter results by US state code
        - name: offer_type
          in: query
          type: string
          description: Filter by offer type (R=retail, A=auction)
        - name: format
          in: query
          type: string
          description: Response format (json or xml)
  exposes:
  - type: rest
    namespace: wine-searcher-market-price-rest
    port: 8080
    description: REST adapter for Wine-Searcher API — market-price. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/market-price
      name: market-price
      description: REST surface for market-price.
      operations:
      - method: GET
        name: getmarketprice
        description: Get Market Price Listings
        call: wine-searcher-market-price.getmarketprice
        with:
          api_key: rest.api_key
          winename: rest.winename
          vintage: rest.vintage
          currencycode: rest.currencycode
          location: rest.location
          state: rest.state
          offer_type: rest.offer_type
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: wine-searcher-market-price-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wine-Searcher API — market-price. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-market-price-listings
      description: Get Market Price Listings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: wine-searcher-market-price.getmarketprice
      with:
        api_key: tools.api_key
        winename: tools.winename
        vintage: tools.vintage
        currencycode: tools.currencycode
        location: tools.location
        state: tools.state
        offer_type: tools.offer_type
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
