naftiko: 1.0.0-alpha2
info:
  label: Wine-Searcher Wine Data
  description: Wine data capability for Wine-Searcher, enabling end-to-end wine price discovery, merchant comparisons, critic
    score lookups, and cellar valuation. Designed for wine apps, investment platforms, insurance tools, e-commerce integrations,
    and market research applications.
  tags:
  - Wine Searcher
  - Wine
  - Prices
  - Data
  - Marketplace
  - Merchants
  - Valuations
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WINE_SEARCHER_API_KEY: WINE_SEARCHER_API_KEY
capability:
  consumes:
  - type: http
    namespace: wine-searcher
    baseUri: https://www.wine-searcher.com/ws_api.php
    description: Wine-Searcher API for wine pricing and data
    authentication:
      type: apikey
      key: api_key
      value: '{{WINE_SEARCHER_API_KEY}}'
      placement: query
    resources:
    - name: wine-check
      path: /wine-check
      description: Wine price check and aggregated data
      operations:
      - name: get-wine-check
        method: GET
        description: Get Wine Check Data
        inputParameters:
        - name: api_key
          in: query
          type: string
          required: true
          description: API key for authentication
        - name: winename
          in: query
          type: string
          required: true
          description: Wine name to look up
        - name: vintage
          in: query
          type: string
          required: false
          description: Vintage year
        - name: currencycode
          in: query
          type: string
          required: false
          description: Currency code
        - name: location
          in: query
          type: string
          required: false
          description: Country filter
        - name: offer_type
          in: query
          type: string
          required: false
          description: Offer type filter (R/A/B)
        - name: format
          in: query
          type: string
          required: false
          description: Response format (json/xml)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: market-price
      path: /market-price
      description: Merchant price listings
      operations:
      - name: get-market-price
        method: GET
        description: Get Market Price Listings
        inputParameters:
        - name: api_key
          in: query
          type: string
          required: true
          description: API key for authentication
        - name: winename
          in: query
          type: string
          required: true
          description: Wine name to look up
        - name: vintage
          in: query
          type: string
          required: false
          description: Vintage year
        - name: currencycode
          in: query
          type: string
          required: false
          description: Currency code
        - name: location
          in: query
          type: string
          required: false
          description: Country filter
        - name: offer_type
          in: query
          type: string
          required: false
          description: Offer type filter (R/A/B)
        - name: format
          in: query
          type: string
          required: false
          description: Response format (json/xml)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: wine-data-api
    description: Unified REST API for Wine-Searcher wine data.
    resources:
    - path: /v1/wines
      name: wines
      description: Wine data lookup by name
      operations:
      - method: GET
        name: get-wine-data
        description: Get aggregated wine data including price, score, and region
        call: wine-searcher.get-wine-check
        with:
          winename: rest.winename
          vintage: rest.vintage
          currencycode: rest.currencycode
          location: rest.location
          offer_type: rest.offer_type
          format: json
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/wines/{winename}/prices
      name: wine-prices
      description: Market price listings for a specific wine
      operations:
      - method: GET
        name: get-wine-prices
        description: Get merchant price listings for a wine
        call: wine-searcher.get-market-price
        with:
          winename: rest.winename
          vintage: rest.vintage
          currencycode: rest.currencycode
          location: rest.location
          offer_type: rest.offer_type
          format: json
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: wine-data-mcp
    transport: http
    description: MCP server for AI-assisted wine data lookup and price comparison.
    tools:
    - name: lookup-wine
      description: Look up a wine by name to get pricing, critic score, grape variety, and region data
      hints:
        readOnly: true
        openWorld: true
      call: wine-searcher.get-wine-check
      with:
        winename: tools.winename
        vintage: tools.vintage
        currencycode: tools.currencycode
      outputParameters:
      - type: object
        mapping: $.
    - name: get-wine-prices
      description: Get merchant listings and prices for a specific wine, sorted lowest price first
      hints:
        readOnly: true
        openWorld: true
      call: wine-searcher.get-market-price
      with:
        winename: tools.winename
        vintage: tools.vintage
        currencycode: tools.currencycode
        location: tools.location
        offer_type: tools.offer_type
      outputParameters:
      - type: object
        mapping: $.
