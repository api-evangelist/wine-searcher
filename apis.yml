apis:
- aid: wine-searcher:wine-searcher-api
  name: Wine-Searcher API
  description: The Wine-Searcher API provides wine pricing data, aggregated critic scores, grape variety, region, and merchant
    listings for any wine in the Wine-Searcher database. The API uses HTTP GET requests with query parameters. Responses are
    available in JSON or XML format. Includes a Wine Check endpoint for aggregated wine data and a Market Price endpoint for
    individual merchant listings.
