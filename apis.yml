aid: wine-searcher
name: Wine-Searcher
description: Wine-Searcher is the world's leading wine search engine and marketplace, providing access to prices, availability,
  and data on over 15 million wines from retailers worldwide. The Wine-Searcher API allows developers to integrate wine pricing
  data, merchant listings, critic scores, vintage availability, and wine details directly into websites and applications.
  Typical API consumers include wine apps, websites, blogs, market research companies, wine investment platforms, and insurance
  services.
